<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <script src="https://d3js.org/d3.v3.min.js"></script>

  <style>
    .axis {
      font: 10px sans-serif;
    }

    .axis path,
    .axis line {
      fill: none;
      stroke: #000;
      shape-rendering: crispEdges;
    }
  </style>
</head>

<body>

<script>

d3.json("baza-prijevoda-hrvatske-književnosti.json", function(error, json) {

  if (error) {
    console.log(error);
    return;
  }

  var counts = {};

  json.forEach(function(d) {
    var lang = d["Strani jezik"];
    if (lang) {
      counts[lang] = (counts[lang] || 0) + 1;
    }
  });

  var data = Object.keys(counts).map(function(key) {
    return {
      jezik: key,
      count: counts[key]
    };
  });

  data.sort(function(a, b) {
    return b.count - a.count;
  });

  var colorScale = d3.scale.ordinal()
  .domain(data.map(function(d) { return d.jezik; }))
  .range([
    "#1f77b4", "#ff7f0e", "#2ca02c", "#d62728", "#9467bd",
    "#8c564b", "#e377c2", "#7f7f7f", "#bcbd22", "#17becf"
  ]);

  var margin = { top: 20, bottom: 120, left: 50, right: 20 };
  var width = 1000 - margin.left - margin.right;
  var height = 500 - margin.top - margin.bottom;

  var x = d3.scale.ordinal()
    .domain(data.map(function(d) { return d.jezik; }))
    .rangeRoundBands([0, width], 0.1);

  var y = d3.scale.linear()
    .domain([0, d3.max(data, function(d) { return d.count; })])
    .range([height, 0]);

  var xAxis = d3.svg.axis()
    .scale(x)
    .orient("bottom");

  var yAxis = d3.svg.axis()
    .scale(y)
    .orient("left")
    .ticks(10);

  var svg = d3.select("body")
    .append("svg")
    .attr("width", width + margin.left + margin.right)
    .attr("height", height + margin.bottom + margin.top)
    .style("background-color", "lightblue")
    .append("g")
    .attr("transform", "translate(" + margin.left + "," + margin.top + ")");

  svg.append("g")
    .attr("class", "x axis")
    .attr("transform", "translate(0," + height + ")")
    .call(xAxis)
    .selectAll("text")
    .style("text-anchor", "end")
    .attr("dx", "-0.8em")
    .attr("dy", "-0.55em")
    .attr("transform", "rotate(-65)");

  svg.append("g")
    .attr("class", "y axis")
    .call(yAxis)
    .append("text")
    .attr("transform", "rotate(-90)")
    .attr("y", -40)
    .attr("x", -height/2)
    .style("text-anchor", "middle")
    .text("Broj prijevoda");

  svg.selectAll("rect")
    .data(data)
    .enter()
    .append("rect")
    .attr("x", function(d) { return x(d.jezik); })
    .attr("y", function(d) { return y(d.count); })
    .attr("width", x.rangeBand())
    .attr("height", function(d) { return height - y(d.count); })
    .attr("fill", d => colorScale(d.jezik));

});

</script>

</body>
</html>
