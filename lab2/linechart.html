<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <script src="https://d3js.org/d3.v3.min.js"></script>
  <style>
    .axis { font: 10px sans-serif; }
    .axis path, .axis line { fill: none; stroke: #000; shape-rendering: crispEdges; }
    .line { fill: none; stroke-width: 2px; }
  </style>
</head>
<body>
<script>
d3.json("baza-prijevoda-hrvatske-književnosti.json", function(error, data) {
  if (error) return;

  var langs = ["njemački", "engleski", "makedonski"];
  var colors = { "njemački": "red", "engleski": "green", "makedonski": "blue" };

  var counts = {};
  data.forEach(function(d) {
    var lang = d["Strani jezik"];
    var year = +d["Godina izdanja"];
    if (langs.indexOf(lang) >= 0 && !isNaN(year)) {
      counts[lang] = counts[lang] || {};
      counts[lang][year] = (counts[lang][year] || 0) + 1;
    }
  });

  var allYears = d3.set(data.map(function(d){ return +d["Godina izdanja"]; })).values().map(Number).sort();
  var maxYear = d3.max(allYears);

  var series = langs.map(function(lang){
    return {
      lang: lang,
      values: allYears.map(function(year){
        return { year: year, count: (counts[lang] && counts[lang][year]) || 0 };
      })
    };
  });

  var margin = {top: 20, right: 150, bottom: 50, left: 50},
      width = 800 - margin.left - margin.right,
      height = 500 - margin.top - margin.bottom;

  var x = d3.scale.linear()
            .domain([1900, maxYear])
            .range([0, width]);

  var y = d3.scale.linear()
            .domain([0, d3.max(series, function(s){ return d3.max(s.values, function(d){ return d.count; }); })])
            .range([height, 0]);

  var xAxis = d3.svg.axis().scale(x).orient("bottom").tickFormat(d3.format("d"));
  var yAxis = d3.svg.axis().scale(y).orient("left").ticks(10);

  var line = d3.svg.line()
               .x(function(d){ return x(d.year); })
               .y(function(d){ return y(d.count); });

  var svg = d3.select("body").append("svg")
              .attr("width", width + margin.left + margin.right)
              .attr("height", height + margin.top + margin.bottom)
            .append("g")
              .attr("transform", "translate(" + margin.left + "," + margin.top + ")");

  svg.append("g").attr("class","x axis").attr("transform","translate(0," + height + ")").call(xAxis);
  svg.append("g").attr("class","y axis").call(yAxis)
     .append("text").attr("transform","rotate(-90)").attr("y",-40).attr("x",-height/2)
     .style("text-anchor","middle").text("Number of translations");

  series.forEach(function(s){
    svg.append("path")
       .datum(s.values)
       .attr("class","line")
       .attr("d", line)
       .style("stroke", colors[s.lang]);
  });

  var legend = svg.selectAll(".legend")
                  .data(langs)
                  .enter().append("g")
                  .attr("class", "legend")
                  .attr("transform", function(d,i){ return "translate(0," + i*20 + ")"; });

  legend.append("rect")
        .attr("x", width + 20)
        .attr("width", 18)
        .attr("height", 18)
        .style("fill", function(d){ return colors[d]; });

  legend.append("text")
        .attr("x", width + 45)
        .attr("y", 9)
        .attr("dy", ".35em")
        .text(function(d){ return d; });

});
</script>
</body>
</html>
