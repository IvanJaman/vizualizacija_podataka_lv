<!DOCTYPE html>
<html>
<head>
    <script src="http://d3js.org/d3.v3.min.js" charset="utf-8"></script>
</head>
<body>
    <h1>SVG</h1>
    <script>
        var svg = d3.select("body")
            .append("svg")
            .attr("width","1000")
            .attr("height","1000");
        svg.append("circle")
            .attr("cx","100")
            .attr("cy","100")
            .attr("r","80")
            .attr("style","stroke:blue; stroke-width:10; fill:white;");
        svg.append("circle")
            .attr("cx","210")
            .attr("cy","100")
            .attr("r","80")
            .attr("style","stroke:black; stroke-width:10; fill:white;");
        svg.append("circle")
            .attr("cx","320")
            .attr("cy","100")
            .attr("r","80")
            .attr("style","stroke:red; stroke-width:10; fill:white;");
        svg.append("circle")
            .attr("cx","150")
            .attr("cy","200")
            .attr("r","80")
            .attr("style","stroke:yellow; stroke-width:10; fill:white;");
        svg.append("circle")
            .attr("cx","260")
            .attr("cy","200")
            .attr("r","80")
            .attr("style","stroke:green; stroke-width:10; fill:white;");
    </script>
</body>
