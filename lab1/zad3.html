<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>VP-LV</title>
  <script src="https://d3js.org/d3.v3.min.js"></script>
</head>
<body>
  <script>
    var body = d3.select("body");

    body.append("h1")
        .html("Vizualizacija podataka LV1");

    var data = d3.range(1, 11);

    var divs = body.selectAll("div")
        .data(data)
        .enter()
        .append("div")
        .attr("id", function(d) {
          return "ID" + d;
        });

    divs.append("h2")
        .html(function(d) {
          return "Podnaslov " + d;
        });

    divs.append("p")
        .html(function(d) {
          return "Tekst " + d + ".";
        });

  </script>
</body>
</html>
