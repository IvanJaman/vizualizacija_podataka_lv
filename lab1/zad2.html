<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>VP-LV</title>
  <script src="https://d3js.org/d3.v3.min.js"></script>
</head>
<body>
  <script>
    var body = d3.select("body");

    body.append("h1")
        .html("Vizualizacija podataka LV1");

    var div1 = body.append("div").attr("id", "ID1");

    div1.append("h2")
        .html("Podnaslov 1");

    div1.append("p")
        .html("Tekst 1.");

    var div2 = body.append("div").attr("id", "ID2");

    div2.append("h2")
        .html("Podnaslov 2");

    div2.append("p")
        .html("Tekst 2.");

    d3.selectAll("p")
      .html(function(d, i) {
        return "Novi tekst " + (i + 1);
    });
  </script>
</body>
</html>
