<!DOCTYPE html>
<html>
<head>
    <script src="http://d3js.org/d3.v3.min.js" charset="utf-8"></script>
</head>
<body>
    <h1>SVG</h1>
    <script>
        var svg = d3.select("body")
            .append("svg")
            .attr("width","1000")
            .attr("height","1000");
        svg.append("rect")
            .attr("x","10")
            .attr("y","10")
            .attr("width","100")
            .attr("height","600")
            .attr("style","stroke:black;stroke-width:5;fill:yellow;fill-opacity:0.5;");
    </script>
</body>
