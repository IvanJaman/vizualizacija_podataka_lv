<!DOCTYPE html>
<html>
<head>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/3.5.17/d3.min.js"></script>
</head>
<body>
<script>
  var widthSVG = 600;
  var heightSVG = 400;
  var widthRect = 120;
  var heightRect = 70;

  var svg = d3.select("body")
    .append("svg")
    .attr("width", widthSVG)
    .attr("height", heightSVG)
    .style("background", "#f5f5f5");

  var startX = widthSVG - widthRect;
  var startY = heightSVG - heightRect;

  var rect = svg.append("rect")
    .attr("x", startX)
    .attr("y", startY)
    .attr("width", widthRect)
    .attr("height", heightRect)
    .style("fill", "steelblue")
    .style("stroke", "#185FA5");

  rect.transition()
    .duration(1000)
    .attr("x", 0)
    .each("end", function() {

      d3.select(this)
        .transition()
        .duration(1000)
        .attr("y", 0);
    });
</script>
</body>
</html>
