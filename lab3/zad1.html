<!DOCTYPE html>
<html>
<head>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/3.5.17/d3.min.js"></script>
</head>
<body>
<script>
  var widthSVG  = 600;
  var heightSVG = 400;
  var squareSize = 80;

  var svg = d3.select("body")
    .append("svg")
    .attr("width", widthSVG)
    .attr("height", heightSVG)
    .style("background", "#f5f5f5");

  var cx = widthSVG  / 2 - squareSize / 2;
  var cy = heightSVG / 2 - squareSize / 2;

  var rect = svg.append("rect")
    .attr("x", cx)
    .attr("y", cy)
    .attr("width", squareSize)
    .attr("height", squareSize)
    .style("fill", "none")
    .style("stroke", "steelblue")
    .style("stroke-width", 3)
    .style("opacity", 1);

  rect.transition()
    .delay(3000)
    .duration(5000)
    .style("fill", "steelblue")
    .each("end", function() {

      var newSize = widthSVG / 2;
      var delta = (newSize - squareSize) / 2;   

      d3.select(this)
        .transition()
        .duration(2000)
        .attr("x", cx - delta)
        .attr("y", cy - delta)
        .attr("width", newSize)
        .attr("height", newSize)
        .style("opacity", 0);
    });
</script>
</body>
</html>
