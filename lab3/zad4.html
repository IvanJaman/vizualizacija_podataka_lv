<!DOCTYPE html>
<html>
<head>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/3.5.17/d3.min.js"></script>
</head>
<body>
<script>
  var widthSVG = 600;
  var heightSVG = 400;
  var rectH = 30;
  var rectW = 100;
  var radius = 20;
  var fallDuration = 1200;

  var svg = d3.select("body")
    .append("svg")
    .attr("width", widthSVG)
    .attr("height", heightSVG)
    .style("background", "#f5f5f5");

  var materials = [
    { label: "Kruta tvar", color: "#888780", ballColor: "#444441", type: "solid" },
    { label: "Elasticna tvar", color: "#378ADD", ballColor: "#185FA5", type: "elastic" },
    { label: "Tekucina", color: "#5DCAA5", ballColor: "#0F6E56", type: "liquid" }
  ];

  var colWidth = widthSVG / 3;
  var rectY = heightSVG - rectH;

  materials.forEach(function(mat, i) {
    var cx = colWidth * i + colWidth / 2;
    var rectX = colWidth * i + (colWidth - rectW) / 2;

    svg.append("rect")
      .attr("x", rectX)
      .attr("y", rectY)
      .attr("width", rectW)
      .attr("height", rectH)
      .style("fill", mat.color)
      .style("opacity", 0.85);

    svg.append("text")
      .attr("x", cx)
      .attr("y", rectY + rectH / 2 + 5)
      .attr("text-anchor", "middle")
      .style("font-size", "12px")
      .style("fill", "#fff")
      .text(mat.label);

    var startY = radius + 10;
    var landY = rectY - radius;

    var ball = svg.append("circle")
      .attr("cx", cx)
      .attr("cy", startY)
      .attr("r", radius)
      .style("fill", mat.ballColor)
      .style("opacity", 0.9);

    ball.transition()
      .duration(fallDuration)
      .ease("quad-in")
      .attr("cy", landY)
      .each("end", function() {
        if (mat.type === "solid") {
          simulateSolid(ball, landY);
        } else if (mat.type === "elastic") {
          simulateElastic(ball, startY, landY, 0);
        } else {
          simulateLiquid(ball, cx, landY, rectY, rectH, mat.color);
        }
      });
  });

  function simulateSolid(ball, landY) {
    ball.transition()
        .duration(150)
        .ease("quad-out")
        .attr("cy", landY - 15)
        .transition()
        .duration(150)
        .ease("quad-in")
        .attr("cy", landY)
        .transition()
        .duration(80)
        .ease("quad-out")
        .attr("cy", landY - 5)
        .transition()
        .duration(80)
        .ease("quad-in")
        .attr("cy", landY);
    }

  function simulateElastic(ball, startY, landY, bounceCount) {
    var maxBounces = 5;
    if (bounceCount >= maxBounces) return;

    var bounceHeight = (landY - startY) * Math.pow(0.5, bounceCount + 1);
    var peakY = landY - bounceHeight;
    var bounceDuration = fallDuration * Math.pow(0.5, bounceCount + 1);

    ball.transition()
      .duration(bounceDuration)
      .ease("quad-out")
      .attr("cy", peakY)
      .transition()
      .duration(bounceDuration)
      .ease("quad-in")
      .attr("cy", landY)
      .each("end", function() {
        simulateElastic(ball, startY, landY, bounceCount + 1);
      });
  }

  function simulateLiquid(ball, cx, landY, rectY, rectH, matColor) {
    var sinkY = rectY + rectH / 2;

    ball.transition()
      .duration(1500)
      .ease("quad-out")
      .attr("cy", sinkY)
      .style("opacity", 0.4)
      .transition()
      .duration(800)
      .style("opacity", 0);
  }
</script>
</body>
</html>
